version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: orderdesk-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: orderdesk

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orderdesk-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - uploads-data:/app/uploads
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/orderdesk

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orderdesk-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - default
      - proxy-net

volumes:
  mongo-data:
  uploads-data:

networks:
  default:
  # Gemeinsames Netzwerk für einen zukünftigen Reverse Proxy (z.B. Caddy).
  # Einmalig auf dem Server anlegen: docker network create proxy-net
  proxy-net:
    external: true
